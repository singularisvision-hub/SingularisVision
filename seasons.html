<main class="hero">

  <div class="grid">

      <img src="images/A-2.jpg">
      <h2>A Series #2</h2>
      <p>Preview</p>
    </div>

    <div class="art-card locked" onclick="openModal('A Series', 'A-3', './images/A-1.jpg')">
      <img src="images/A-3.jpg">
      <h2>A Series #3</h2>
      <p>Locked</p>
    </div>

    <div class="art-card active" onclick="openModal('B Series', 'B-1', 'images/B-1.jpg')">
      <img src="images/B-1.jpg">
      <h2>B Series #1</h2>
      <p>Active</p>
    </div>

    <div class="art-card preview" onclick="openModal('B Series', 'B-2', 'images/B-2.jpg')">
      <img src="images/B-2.jpg">
      <h2>B Series #2</h2>
      <p>Preview</p>
    </div>

    <div class="art-card locked" onclick="openModal('B Series', 'B-3', './images/A-1.jpg')">
      <img src="images/B-3.jpg">

      <img src="images/C-2.jpg">

      <p>Preview</p>

    <div class="art-card locked" onclick="openModal('C Series', 'C-3', './images/A-1.jpg')">

      <p>Locked</p>
    </div>

  </div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <button onclick="closeModal()">×</button>

    <h2 id="modal-title"></h2>
    <p id="modal-status"></p>

    <img id="modal-image" style="width:100%; margin-top:10px; border-radius:10px;">

  </div>
</div>

<script>
function openModal(title, status, image) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-title").innerText = title;
  document.getElementById("modal-status").innerText = status;
  document.getElementById("modal-image").src = image;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
